<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Directors CSV → SQL for Supabase</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 16px; }
    textarea { width: 100%; height: 140px; font-family: monospace; font-size: 13px; }
    pre { background: #111; color: #e6e6e6; padding: 16px; overflow: auto; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
    button { padding: 10px 18px; cursor: pointer; margin-top: 8px; }
    p { color: #444; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>Directors CSV → SQL</h1>
  <p>
    Paste your CSV below (first row = headers). Column names can be anything — pick which column is <strong>name</strong> and which is <strong>email</strong> after you paste.
  </p>
  <textarea id="csv" placeholder='Full Name,Email&#10;Jane Doe,jane@school.edu&#10;Bob Smith,bob@school.edu'></textarea>
  <div style="margin-top:12px;">
    <label>Name column header (exact): <input id="colName" type="text" value="Full Name" /></label>
    &nbsp;&nbsp;
    <label>Email column header (exact): <input id="colEmail" type="text" value="Email" /></label>
  </div>
  <button type="button" id="go">Generate SQL</button>
  <h2>Copy this into Supabase → SQL → Run</h2>
  <pre id="out">(click Generate)</pre>

  <script>
    function parseCsvLine(line) {
      const out = [];
      let cur = '';
      let inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (inQ) {
          if (c === '"') {
            if (line[i + 1] === '"') { cur += '"'; i++; }
            else inQ = false;
          } else cur += c;
        } else {
          if (c === '"') inQ = true;
          else if (c === ',') { out.push(cur); cur = ''; }
          else cur += c;
        }
      }
      out.push(cur);
      return out.map((s) => s.trim());
    }

    document.getElementById('go').onclick = () => {
      const raw = document.getElementById('csv').value.trim();
      const nameH = document.getElementById('colName').value.trim();
      const emailH = document.getElementById('colEmail').value.trim();
      const lines = raw.split(/\r?\n/).filter((l) => l.trim());
      if (lines.length < 2) {
        document.getElementById('out').textContent = 'Need a header row + at least one data row.';
        return;
      }
      const header = parseCsvLine(lines[0]);
      const iName = header.indexOf(nameH);
      const iEmail = header.indexOf(emailH);
      if (iName < 0 || iEmail < 0) {
        document.getElementById('out').textContent =
          'Could not find headers. Found: ' +
          JSON.stringify(header) +
          '\nFix the header names in the boxes to match exactly (including spaces/capital letters).';
        return;
      }

      const rows = [];
      for (let r = 1; r < lines.length; r++) {
        const cells = parseCsvLine(lines[r]);
        const fullName = (cells[iName] || '').trim();
        const email = (cells[iEmail] || '').trim().toLowerCase();
        if (!email) continue;
        const obj = {
          full_name: fullName,
          email,
          phone: '',
          organization: '',
          notes: '',
        };
        const jsonStr = JSON.stringify(obj).replace(/'/g, "''");
        rows.push(`  ('${jsonStr}'::jsonb)`);
      }

      if (!rows.length) {
        document.getElementById('out').textContent = 'No rows with an email found.';
        return;
      }

      document.getElementById('out').textContent =
        'INSERT INTO public.directors (body)\nVALUES\n' +
        rows.join(',\n') +
        ';\n\n-- If a director already exists (same email in body), you may get duplicates — delete extras in Table Editor if needed.';
    };
  </script>
</body>
</html>
